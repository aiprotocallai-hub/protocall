<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtoCall — Έρχεται Σύντομα</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1F4E;
            --green: #00C48C;
            --off-white: #F7F8FC;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Source Sans 3', sans-serif;
            background-color: var(--navy);
            color: white;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }
        .container { padding: 20px; animation: fadeIn 1.2s ease; }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 42px; font-weight: 700;
            margin-bottom: 20px;
        }
        .logo span.call { color: var(--green); }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 5vw, 48px);
            margin-bottom: 15px; font-weight: 900;
        }
        p {
            font-size: 18px; color: rgba(255,255,255,0.7);
            max-width: 500px; margin: 0 auto 30px; font-weight: 300;
        }
        .badge {
            display: inline-block;
            background: rgba(0,196,140,0.15);
            color: var(--green);
            padding: 8px 20px; border-radius: 100px;
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 30px; border: 1px solid var(--green);
        }
        .contact {
            font-size: 15px; color: var(--green);
            text-decoration: none; font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border 0.3s;
        }
        .contact:hover { border-bottom: 1px solid var(--green); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Proto<span class="call">Call</span></div>
        <div class="badge">Coming Soon</div>
        <h1>Η πρώτη φωνή της επιχείρησής σας ετοιμάζεται.</h1>
        <p>Σύντομα το τηλέφωνό σας θα απαντάει πάντα, ακόμα και όταν εσείς δεν μπορείτε. Μείνετε συντονισμένοι.</p>
        <a href="mailto:info@protocall.gr" class="contact">info@protocall.gr</a>
    </div>
</body>
</html>
